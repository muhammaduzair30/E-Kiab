name: ekitab
description: E-Kitab Learning App for Pakistani Schools — AI-powered bilingual education platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Code generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Firebase
  firebase_core: ^2.31.0
  firebase_auth: ^4.19.0
  firebase_storage: ^11.7.0
  cloud_firestore: ^4.17.0
  google_sign_in: ^6.2.1

  # UI & Animations
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.67.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0
  badges: ^3.1.2

  # File handling
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  open_filex: ^4.5.1

  # Utils
  intl: any
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  uuid: ^4.4.0
  logger: ^2.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  internet_connection_checker: ^1.0.0+1

  flutter_tts: ^4.2.5
  google_generative_ai: ^0.4.7
  flutter_markdown: ^0.7.7+1
  syncfusion_flutter_pdfviewer: ^27.2.5
  syncfusion_flutter_pdf: ^27.2.5
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: 2.3.5
  mockito: ^5.4.4
  bloc_test: ^9.1.0

dependency_overrides:
  intl: ^0.20.2
  analyzer: ^5.13.0

flutter:
  uses-material-design: true
  assets:
    - scripts/.env
    - assets/images/
    - assets/animations/
    - assets/icons/
  fonts:
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf
        - asset: assets/fonts/NotoNastaliqUrdu-Bold.ttf
          weight: 700
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
